<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="t d"><title id="t">OSI network model and GKOS knowledge governance model</title><desc id="d">Seven-layer architectural analogy between reliable data movement and trustworthy knowledge operations.</desc><style>text{font-family:Arial,sans-serif}.h{font-size:34px;font-weight:700}.s{font-size:22px}.l{font-size:25px;font-weight:700}.n{font-size:18px}.box{rx:14;stroke:#fff;stroke-width:4}</style><rect width="1400" height="900" fill="#f7fafc"/><text x="700" y="48" text-anchor="middle" class="h">GRAPHICAL COMPARISON: OSI NETWORK MODEL &amp; GKOS KNOWLEDGE GOVERNANCE MODEL</text><rect x="30" y="75" width="645" height="85" rx="16" fill="#b7d8e8"/><rect x="725" y="75" width="645" height="85" rx="16" fill="#bfe4df"/><text x="352" y="115" text-anchor="middle" class="h">OSI NETWORK MODEL</text><text x="352" y="145" text-anchor="middle" class="s">How data moves reliably</text><text x="1047" y="115" text-anchor="middle" class="h">GKOS KNOWLEDGE GOVERNANCE MODEL</text><text x="1047" y="145" text-anchor="middle" class="s">How knowledge becomes trustworthy</text><g><rect class="box" x="30" y="170" width="645" height="70" fill="#cce6f2"/><rect class="box" x="30" y="240" width="645" height="70" fill="#d7ece8"/><rect class="box" x="30" y="310" width="645" height="70" fill="#e3efd8"/><rect class="box" x="30" y="380" width="645" height="70" fill="#eef1c8"/><rect class="box" x="30" y="450" width="645" height="70" fill="#faeab8"/><rect class="box" x="30" y="520" width="645" height="70" fill="#f8d5b3"/><rect class="box" x="30" y="590" width="645" height="70" fill="#f3c4b6"/><text x="55" y="214" class="l">7 APPLICATION</text><text x="340" y="212" class="n">User-facing network services</text><text x="55" y="284" class="l">6 PRESENTATION</text><text x="340" y="282" class="n">Translation, formatting, encryption</text><text x="55" y="354" class="l">5 SESSION</text><text x="340" y="352" class="n">Opens, maintains, closes sessions</text><text x="55" y="424" class="l">4 TRANSPORT</text><text x="340" y="422" class="n">Reliable delivery, ordering, errors</text><text x="55" y="494" class="l">3 NETWORK</text><text x="340" y="492" class="n">Routing between destinations</text><text x="55" y="564" class="l">2 DATA LINK</text><text x="340" y="562" class="n">Frames, addressing, local delivery</text><text x="55" y="634" class="l">1 PHYSICAL</text><text x="340" y="632" class="n">Signals, hardware, transmitted bits</text></g><g><rect class="box" x="725" y="170" width="645" height="70" fill="#cce6f2"/><rect class="box" x="725" y="240" width="645" height="70" fill="#d7ece8"/><rect class="box" x="725" y="310" width="645" height="70" fill="#e3efd8"/><rect class="box" x="725" y="380" width="645" height="70" fill="#eef1c8"/><rect class="box" x="725" y="450" width="645" height="70" fill="#faeab8"/><rect class="box" x="725" y="520" width="645" height="70" fill="#f8d5b3"/><rect class="box" x="725" y="590" width="645" height="70" fill="#f3c4b6"/><text x="750" y="214" class="l">7 AUTHORIZED USE</text><text x="1070" y="202" class="n">Approved knowledge supports decisions,</text><text x="1070" y="224" class="n">research, publication, automation, action</text><text x="750" y="284" class="l">6 CONTEXT PRESENTATION</text><text x="1070" y="272" class="n">Facts, relationships, warnings, history</text><text x="1070" y="294" class="n">compiled for a purpose and recipient</text><text x="750" y="354" class="l">5 REVIEW AND WORKFLOW</text><text x="1070" y="342" class="n">Proposals accepted, rejected, deferred,</text><text x="1070" y="364" class="n">withdrawn, expired, or reviewed further</text><text x="750" y="424" class="l">4 VALIDATION AND CONTROL</text><text x="1070" y="412" class="n">Policy, permissions, confidence, identity,</text><text x="1070" y="434" class="n">sensitivity, and deterministic rules</text><text x="750" y="494" class="l">3 RELATIONSHIPS AND LINEAGE</text><text x="1070" y="482" class="n">Sources, claims, contradictions,</text><text x="1070" y="504" class="n">dependencies, provenance, temporal scope</text><text x="750" y="564" class="l">2 STRUCTURE AND IDENTITY</text><text x="1070" y="552" class="n">Stable IDs, schemas, metadata,</text><text x="1070" y="574" class="n">record types, canonical representation</text><text x="750" y="634" class="l">1 ORIGINAL SOURCES</text><text x="1070" y="622" class="n">Documents, records, evidence, notes,</text><text x="1070" y="644" class="n">files, observations, source revisions</text></g><rect x="30" y="680" width="1340" height="70" rx="14" fill="#c9e8f0"/><text x="700" y="714" text-anchor="middle" class="l">HUMAN + AGENT + SYSTEM RESPONSIBILITY</text><text x="110" y="740" class="n">AGENT: extracts, links, classifies, detects conflicts, drafts proposals.</text><text x="520" y="740" class="n">HUMAN: reviews consequential changes and retains final authority.</text><text x="1010" y="740" class="n">SYSTEM: preserves originals, records actions, prevents silent edits.</text><rect x="30" y="770" width="1340" height="100" rx="14" fill="#e2eef3"/><text x="700" y="805" text-anchor="middle" class="l">SIMPLIFIED KNOWLEDGE FLOW</text><text x="70" y="842" class="s">Raw source → Preserve → Structure → Connect → Validate → Review → Compile → Authorized use</text><text x="700" y="865" text-anchor="middle" class="n">Architectural analogy: OSI standardizes responsibilities for moving data; GKOS separates responsibilities for preserving, interpreting, governing, and using knowledge.</text></svg>
